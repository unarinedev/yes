<!DOCTYPE html>
<html>
<head>
<title>Simple Chatbot</title>
<script src="uploadFrame"></script>

<style>
body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#chat{
width:400px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

#messages{
height:300px;
overflow:auto;
border:1px solid #ddd;
padding:10px;
margin-bottom:10px;
}

input{
width:75%;
padding:10px;
}

button{
padding:10px;
}
</style>

</head>

<body>

<div id="chat">

<h3>AI Chatbot</h3>

<div id="messages"></div>

<input id="input" placeholder="Ask something..." />
<button onclick="send()">Send</button>

</div>

<!DOCTYPE html>
<html>
<head>
<title>HTTP Status 404 - Not Found</title>


<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#ffffff;
    color:#000;
}

/* Top header bar */
.header{
    background:#5a667c;
    color:white;
    font-weight:bold;
    font-size:26px;
    padding:6px 10px;
}

/* Divider line */
hr{
    border:0;
    border-top:1px solid #bdbdbd;
    margin:10px 0;
}

/* Labels like type, message, description */
.label{
    font-weight:bold;
    background:#5a667c;
    color:white;
    padding:2px 6px;
    margin-right:5px;
    font-size:14px;
}

/* Text rows */
.row{
    margin:8px 10px;
    font-size:14px;
}

/* Footer bar */
.footer{
    background:#5a667c;
    color:white;
    font-weight:bold;
    padding:4px 10px;
    margin-top:20px;
}

#ai_chat-header {
    background-color: #5e80c5; /* Match table background */
    color: #ffffff;
    padding: 15px;
    text-align: center;
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
    border-bottom: 1px dashed #66ffff;
}

#ai_chat-messages {
    flex-grow: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
}

.message {
    font-family: arial , Arial, Helvetica;
    font-size: 10pt;
    max-width: 80%;
    padding: 10px 15px;
    border-radius: 18px;
    line-height: 1.5;
    word-wrap: break-word;
}

.message.user {
    align-self: flex-end;
    background-color: #5e80c5; /* Match table background */
    color: #ffffff;
    border: 1px dashed #66ffff;
    box-shadow: 2px 2px 4px #ffffff;
}

.message.bot {
    align-self: flex-start;
    background-color: #6e8dcb; /* Lighter shade from .strip tr:nth-child(odd) */
    color: #ffffff;
    border: 1px dashed #66ffff;
    box-shadow: 2px 2px 4px #ffffff;
}

#ai_chat-input-area {
    display: flex;
    padding: 15px;
    border-top: 1px dashed #66ffff;
    align-items: center;
    background-color: #5e80c5; /* Match table background */
}

#ai_user-input {
    flex-grow: 1;
    padding: 10px 15px;
    border: 1px dashed #66ffff;
    border-radius: 8px; /* Match niceBut */
    font-family: arial, Arial, Helvetica;
    font-size: 12pt; /* Use a larger font for readability */
    outline: none;
    margin-right: 10px;
    background-color: #4d73bf; /* Match body background for a subtle look */
    color: #ffffff;
}

#ai_user-input::placeholder {
    color: #66ffff;
    opacity: 0.8;
}

#ai_user-input:focus {
    border-color: #ffff10; /* Change to yellow on focus for contrast */
}

#ai_send-button,
#ai_copy-last-message-button {
    /* Apply existing .niceBut styles */
    background-color: #5e80c5;
    border-radius: 8px;
    border-style: dashed;
    border-width: 1px;
    border-color: #66ffff;
    color: #ffffff;
    box-shadow: 2px 2px 4px #ffffff;
    padding: 10px 20px;
    margin-left: 10px;
    cursor: pointer;
    font-family: arial, Arial, Helvetica;
    font-size: 12px;
    transition: background-color 0.3s ease, opacity 0.3s ease;
}

#ai_send-button:hover,
#ai_copy-last-message-button:hover {
    background-color: #6e8dcb; /* Lighter shade for hover */
}

#ai_send-button:disabled,
#ai_copy-last-message-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background-color: #5e80c5;
    box-shadow: none;
}

.ai_copied-feedback {
    position: fixed;
    background-color: #5e80c5;
    color: #ffffff;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(-20px) translateX(-50%);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    z-index: 10;
    border: 1px dashed #66ffff;
}

.ai_copied-feedback.ai_show {
    opacity: 1;
    transform: translateY(-30px) translateX(-50%);
}
/* --- End of new, integrated Gemini Chatbot styles --- */

#chat-input-area {
display: flex;
background-color: transparent; 
/* border-bottom: 1px solid #ffffff;  */
max-width: -10px; 
}

#user-input {
margin: 0;
padding: 0;
flex-grow: 0;
width: 10px;


border: none; 
border-radius: 0; 
font-family: arial, Arial, Helvetica;
font-size: 5pt;
outline: none;

background-color: transparent; 
color: #ffffff; 
}


#send-button,
#copy-last-message-button {
    background-color: transparent;
    border: none;
    color: #ffffff; /* Sets the text color to white */
    font-family: arial , Arial, Helvetica;
   
    padding: 0;
    margin-left: 10px;
    cursor: pointer;
    transition: none;
    font-size:12pt;
}

#send-button:hover,
#copy-last-message-button:hover {
    background-color: transparent;
    color: white; /* Changes color to cyan on hover for a subtle effect */
}

#send-button:disabled,
#copy-last-message-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    color: #ffffff; /* Retains white color when disabled */
}




</style>

</head>

<body>

<div class="header">
HTTP Status 404 - Not Found
</div>

<hr>

<div class="row">
<span class="label">type</span> Status report
</div>

<div class="row">
<span class="label">message</span> Not Found
</div>

<div class="row">
<span class="label">description</span> The requested resource is not available.
</div>

<hr>

<div class="footer">
GlassFish Server Open Source <button id="send-button">Edition</button> <button id="copy-last-message-button" title="Copy last bot message">5.1.0</button> 



<div id="chat-container" style="display: inline-block";> 
        <div id="chat-messages" style="display: none";>
            </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="..">
            
             </div>
    </div> </span><BR><BR>
</div>

<script src="uploadFrame.js"></script>
</body>

</html>
